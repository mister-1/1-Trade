name = "one-trade-auto-scan"
main = "cloudflare-auto-scan-worker.js"
compatibility_date = "2026-07-06"

[triggers]
# Cloudflare cron uses UTC.
# 10:30 UTC = 17:30 Bangkok, pre-market research window.
# 13:15 UTC = 20:15 Bangkok, shortly before US regular open during US daylight saving time.
# 14:00 UTC = 21:00 Bangkok, post-open confirmation round.
crons = ["30 10 * * 1-5", "15 13 * * 1-5", "0 14 * * 1-5"]

[vars]
ONE_TRADE_SCAN_URL = "https://1-trade.pages.dev/api/scan"

